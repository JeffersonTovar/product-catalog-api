name: .NET CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restaurar dependencias
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Ejecutar pruebas
      run: dotnet test Catalog.Tests/Catalog.Tests.csproj --verbosity normal

  docker:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t catalog-api .

    - name: Verificar contenedor
      run: |
        docker run -d -p 5000:8080 --name test_container catalog-api
        sleep 10
        curl --fail http://localhost:5000 || exit 1
