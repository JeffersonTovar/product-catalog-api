name: CI - Product Catalog API

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore dependencies
        run: dotnet restore Catalog.sln

      - name: Build solution
        run: dotnet build Catalog.sln --no-restore --configuration Release

      - name: Run tests (excluding integration)
        run: dotnet test Catalog.sln --no-build --configuration Release --filter "Category!=Integration"

  docker:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t catalog-api .

      - name: Verify Docker image created
        run: docker images | grep catalog-api
